<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Handwriting Generator FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>
body { font-family: Arial; text-align:center; margin:0; }

.page {
  margin:auto;
  padding:40px;
  position:relative;
  overflow:hidden;
}

.page::before {
  content:"";
  position:absolute;
  left:60px;
  width:2px;
  height:100%;
  background:red;
}

.single {
  background-image: repeating-linear-gradient(to bottom, white 0, white 28px, #4a90e2 29px);
}

.double {
  background-image: repeating-linear-gradient(to bottom,#ffb3b3 0,#ffb3b3 2px,white 2px,white 20px,#4a90e2 21px);
}

canvas { width:95%; border:2px dashed black; }

@media print {
  .page { page-break-after: always; margin:0; }
}
</style>

</head>

<body>

<h2>Handwriting Generator FINAL</h2>

<input id="textInput" placeholder="Enter text">

<select id="paperSize" onchange="applyPaperSize()">
<option>A4</option>
<option>A5</option>
<option>Letter</option>
</select>

<select id="paperStyle">
<option value="single">Single</option>
<option value="double">Double</option>
</select>

<input type="range" id="spacing" min="20" max="60" value="30">

<br>

<button onclick="generate()">Generate</button> <button onclick="window.print()">Print</button>

<div id="pages"></div>

<h3>Draw Letter</h3>
<canvas id="drawCanvas" width="200" height="200"></canvas><br>
<input id="charInput">
<button onclick="saveLetter()">Save</button>

<script>
// ===== DRAW =====
// ===== SETTINGS (REAL PAPER SYSTEM) =====
const PAPER = {
  A4: { width: 210, height: 297 },
  A5: { width: 148, height: 210 },
  Letter: { width: 216, height: 279 }
};

const DPI = 3.78; // px per mm

// ===== DRAW (FIXED FOR MOBILE) =====
function setupCanvas(canvas) {
  const ctx = canvas.getContext("2d");
  let drawing = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
      x: t.clientX - rect.left,
      y: t.clientY - rect.top
    };
  }

  canvas.addEventListener("mousedown", () => drawing = true);
  canvas.addEventListener("mouseup", () => {
    drawing = false;
    ctx.beginPath();
  });

  canvas.addEventListener("mousemove", (e) => {
    if (!drawing) return;
    const p = getPos(e);
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  });

  canvas.addEventListener("touchstart", () => drawing = true);
  canvas.addEventListener("touchend", () => {
    drawing = false;
    ctx.beginPath();
  });

  canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if (!drawing) return;
    const p = getPos(e);
    ctx.lineWidth = 3;
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  });

  return ctx;
}

const ctx = setupCanvas(drawCanvas);

// ===== SAVE LETTER =====
function saveLetter() {
  const c = charInput.value;
  if (!c) return alert("Enter letter");
  localStorage.setItem("char_" + c, drawCanvas.toDataURL());
}

// ===== CREATE PAGE (REAL SIZE) =====
function createPage(style, sizeKey) {
  const size = PAPER[sizeKey];
  const page = document.createElement("div");

  page.className = "page " + style;

  page.style.width = size.width * DPI + "px";
  page.style.height = size.height * DPI + "px";

  return page;
}

// ===== GENERATE (FIXED ENGINE) =====
function generate() {
  const text = textInput.value;
  const spacing = parseInt(document.getElementById("spacing").value);
  const style = paperStyle.value;
  const sizeKey = paperSize.value;

  pages.innerHTML = "";

  let page = createPage(style, sizeKey);
  pages.appendChild(page);

  const marginLeft = 70;
  const marginTop = 40;

  const lineHeight = spacing;
  const charWidth = 24;

  let x = marginLeft;
  let y = marginTop;

  const pageHeight = PAPER[sizeKey].height * DPI - 60;
  const pageWidth = PAPER[sizeKey].width * DPI - 40;

  [...text].forEach((ch) => {
    const imgData = localStorage.getItem("char_" + ch);

    let el;
    if (imgData) {
      el = document.createElement("img");
      el.src = imgData;
      el.style.height = (lineHeight * 0.8) + "px";
    } else {
      el = document.createElement("span");
      el.textContent = ch;
      el.style.fontSize = (lineHeight * 0.8) + "px";
    }

    el.style.position = "absolute";
    el.style.left = x + "px";
    el.style.top = y + "px";

    page.appendChild(el);

    x += charWidth;

    // wrap line
    if (x > pageWidth) {
      x = marginLeft;
      y += lineHeight;
    }

    // new page
    if (y > pageHeight) {
      page = createPage(style, sizeKey);
      pages.appendChild(page);
      x = marginLeft;
      y = marginTop;
    }
  });
}
</script>

</body>
</html>
