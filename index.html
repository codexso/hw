<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Handwriting Generator FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>
body { font-family: Arial; text-align:center; margin:0; }

.page {
  margin:auto;
  padding:40px;
  position:relative;
  overflow:hidden;
}

.page::before {
  content:"";
  position:absolute;
  left:60px;
  width:2px;
  height:100%;
  background:red;
}

.single {
  background-image: repeating-linear-gradient(to bottom, white 0, white 28px, #4a90e2 29px);
}

.double {
  background-image: repeating-linear-gradient(to bottom,#ffb3b3 0,#ffb3b3 2px,white 2px,white 20px,#4a90e2 21px);
}

canvas { width:95%; border:2px dashed black; }

@media print {
  .page { page-break-after: always; margin:0; }
}
</style>

</head>

<body>

<h2>Handwriting Generator FINAL</h2>

<input id="textInput" placeholder="Enter text">

<select id="paperSize" onchange="applyPaperSize()">
<option>A4</option>
<option>A5</option>
<option>Letter</option>
</select>

<select id="paperStyle">
<option value="single">Single</option>
<option value="double">Double</option>
</select>

<input type="range" id="spacing" min="20" max="60" value="30">

<br>

<button onclick="generate()">Generate</button> <button onclick="window.print()">Print</button>

<div id="pages"></div>

<h3>Draw Letter</h3>
<canvas id="drawCanvas" width="200" height="200"></canvas><br>
<input id="charInput">
<button onclick="saveLetter()">Save</button>

<script>
// ===== DRAW =====
const ctx=drawCanvas.getContext("2d");
let d=false;

drawCanvas.onmousedown=()=>d=true;
drawCanvas.onmouseup=()=>{d=false;ctx.beginPath();}
drawCanvas.onmousemove=e=>{
 if(!d)return;
 ctx.lineWidth=3;
 ctx.lineTo(e.offsetX,e.offsetY);
 ctx.stroke();
 ctx.beginPath();
 ctx.moveTo(e.offsetX,e.offsetY);
};

// ===== SAVE LETTER =====
function saveLetter(){
 localStorage.setItem("char_"+charInput.value,drawCanvas.toDataURL());
}

// ===== PAPER SIZE =====
function applyPaperSize(){
 const size=paperSize.value;
 let w,h;

 if(size==="A4"){w=794;h=1123;}
 if(size==="A5"){w=559;h=794;}
 if(size==="Letter"){w=816;h=1056;}

 document.querySelectorAll(".page").forEach(p=>{
   p.style.width=w+"px";
   p.style.height=h+"px";
 });
}

// ===== GENERATE =====
function generate(){
 let text=textInput.value;
 let spacing=parseInt(document.getElementById("spacing").value);
 let style=document.getElementById("paperStyle").value;

 pages.innerHTML="";

 let page=createPage(style);
 pages.appendChild(page);

 let x=0,y=0;

 [...text].forEach(ch=>{
   let img=document.createElement("img");
   img.src=localStorage.getItem("char_"+ch)||"";
   img.style.position="absolute";
   img.style.top=(y*spacing+20)+"px";
   img.style.left=(x+70)+"px";
   img.style.height="30px";

   page.appendChild(img);

   x+=25;
   if(x>700){x=0;y++;}
   if(y*spacing>1000){
     page=createPage(style);
     pages.appendChild(page);
     x=0;y=0;
   }
 });

 applyPaperSize();
}

// ===== CREATE PAGE =====
function createPage(style){
 let p=document.createElement("div");
 p.className="page "+style;
 return p;
}
</script>

</body>
</html>
