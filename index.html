<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwriting Generator Clean</title>

<style>
body { font-family: Arial; text-align:center; margin:0; }

.controls {
  padding:10px;
  position:sticky;
  top:0;
  background:#fff;
  z-index:10;
}

input, select, button {
  padding:8px;
  margin:5px;
  border-radius:6px;
}

.page {
  margin:20px auto;
  position:relative;
  background:white;
  overflow:hidden;
}

/* margin line */
.page::before {
  content:"";
  position:absolute;
  left:60px;
  width:2px;
  height:100%;
  background:red;
}

/* notebook lines */
.single {
  background-image: repeating-linear-gradient(
    to bottom, white 0px, white 28px, #4a90e2 29px
  );
}

/* drawing */
canvas {
  border:2px dashed black;
  width:90%;
  max-width:300px;
  touch-action:none;
}

/* print */
@media print {
  body { background:white; }
  .controls, canvas { display:none; }
  .page { margin:0; page-break-after:always; }
}
</style>

</head>

<body>

<div class="controls">

<input id="textInput" placeholder="Enter text">

<select id="paperSize">
  <option>A4</option>
  <option>A5</option>
  <option>Letter</option>
</select>

<input type="range" id="spacing" min="20" max="60" value="30">

<button onclick="generate()">Generate</button> <button onclick="window.print()">Print</button>

<br>

<input id="profileName" placeholder="Profile">
<button onclick="saveProfile()">Save</button>
<button onclick="loadProfile()">Load</button>

</div>

<div id="pages"></div>

<h3>Draw Letter</h3>
<canvas id="drawCanvas" width="200" height="200"></canvas><br>
<input id="charInput" placeholder="Letter">
<button onclick="saveLetter()">Save Letter</button>

<script>
// ===== PAPER =====
const DPI = 3.78;
const PAPER = {
  A4: [210,297],
  A5: [148,210],
  Letter: [216,279]
};

// ===== CANVAS DRAW =====
const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;

function pos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX-r.left,y:t.clientY-r.top};
}

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>{drawing=false;ctx.beginPath();};
canvas.onmousemove=e=>{
  if(!drawing)return;
  let p=pos(e);
  ctx.lineWidth=3;
  ctx.lineCap="round";
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
};

canvas.ontouchstart=()=>drawing=true;
canvas.ontouchend=()=>{drawing=false;ctx.beginPath();};
canvas.ontouchmove=e=>{
  e.preventDefault();
  if(!drawing)return;
  let p=pos(e);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
};

// ===== SAVE LETTER =====
function saveLetter(){
  let c=charInput.value;
  if(!c)return;
  localStorage.setItem("char_"+c,canvas.toDataURL());
  alert("Saved "+c);
}

// ===== GENERATE =====
function generate(){
  let text=textInput.value;
  let size=paperSize.value;
  let spacing=parseInt(document.getElementById("spacing").value);

  pages.innerHTML="";

  let [wmm,hmm]=PAPER[size];
  let w=wmm*DPI, h=hmm*DPI;

  let page=createPage(w,h);
  pages.appendChild(page);

  let x=70, y=40;

  for(let ch of text){
    let data=localStorage.getItem("char_"+ch);

    let el;
    if(data){
      el=document.createElement("img");
      el.src=data;
      el.style.height=spacing*0.8+"px";
    } else {
      el=document.createElement("span");
      el.innerText=ch;
      el.style.fontSize=spacing*0.8+"px";
    }

    el.style.position="absolute";
    el.style.left=x+"px";
    el.style.top=y+"px";

    page.appendChild(el);

    x+=spacing*0.7;

    if(x>w-50){
      x=70;
      y+=spacing;
    }

    if(y>h-50){
      page=createPage(w,h);
      pages.appendChild(page);
      x=70;
      y=40;
    }
  }
}

// ===== CREATE PAGE =====
function createPage(w,h){
  let p=document.createElement("div");
  p.className="page single";
  p.style.width=w+"px";
  p.style.height=h+"px";
  return p;
}

// ===== PROFILE =====
function saveProfile(){
  let name=profileName.value;
  let data={};

  for(let i=32;i<127;i++){
    let ch=String.fromCharCode(i);
    let d=localStorage.getItem("char_"+ch);
    if(d)data[ch]=d;
  }

  localStorage.setItem("profile_"+name,JSON.stringify(data));
  alert("Saved profile");
}

function loadProfile(){
  let name=profileName.value;
  let d=localStorage.getItem("profile_"+name);
  if(!d)return alert("Not found");

  let data=JSON.parse(d);
  for(let ch in data){
    localStorage.setItem("char_"+ch,data[ch]);
  }
  alert("Loaded");
}
</script>

</body>
</html>
